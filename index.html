<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In.printing.lab | Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg: #050505;
            --card: #111111;
            --card-2: #121212;
            --line: rgba(255,255,255,0.08);
            --accent: #f97316;
            --accent-2: #fb923c;
        }
        body { background-color: var(--bg); color: #e5e5e5; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; position: relative; min-height: 100vh; }

        /* Fundo: grelha "blueprint" + glow laranja a mover-se lentamente */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            background-color: var(--bg);
            background-image: radial-gradient(rgba(255,255,255,0.09) 1px, transparent 1px);
            background-size: 26px 26px;
            background-position: 0 0;
        }
        body::after {
            content: "";
            position: fixed;
            inset: -10%;
            z-index: -1;
            background:
                radial-gradient(45rem 30rem at 15% 20%, rgba(249,115,22,0.16), transparent 60%),
                radial-gradient(38rem 26rem at 85% 75%, rgba(251,146,60,0.12), transparent 60%);
            animation: derivaGlow 22s ease-in-out infinite alternate;
            filter: blur(10px);
        }
        @keyframes derivaGlow {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(3%, -4%) scale(1.08); }
            100% { transform: translate(-3%, 3%) scale(1); }
        }
        @media (prefers-reduced-motion: reduce) {
            body::after { animation: none; }
        }

        /* Elementos técnicos flutuantes (impressão 3D) */
        #bg-elementos { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        #bg-elementos svg { position: absolute; }
        .bg-icon-branco { stroke: rgba(255,255,255,0.14); }
        .bg-icon-laranja { stroke: rgba(249,115,22,0.20); }
        #bg-elementos .flutua-lenta { animation: flutuaLenta 16s ease-in-out infinite; }
        #bg-elementos .flutua-lenta-2 { animation: flutuaLenta 20s ease-in-out infinite reverse; }
        @keyframes flutuaLenta {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-14px) rotate(3deg); }
        }
        @media (prefers-reduced-motion: reduce) {
            #bg-elementos .flutua-lenta, #bg-elementos .flutua-lenta-2 { animation: none; }
        }
        h1, h2, h3, .display { font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.02em; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn .35s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .modal-scroll { max-height: 85vh; overflow-y: auto; scrollbar-width: none; }
        .modal-scroll::-webkit-scrollbar { display: none; }

        .card-produto { transition: border-color .25s ease, transform .2s ease; }
        .card-produto:hover { border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }
        .card-produto img { transition: transform .4s ease; }
        .card-produto:hover img { transform: scale(1.06); }

        .chip { transition: all .2s ease; white-space: nowrap; }
        .chip.active { background: var(--accent); color: #050505; border-color: var(--accent); }

        #modal { backdrop-filter: blur(6px); }
        #modal.hidden { display: none; }
        #modal-content { animation: popIn .3s cubic-bezier(.2,.8,.2,1); }
        @keyframes popIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }

        .carrossel-wrap { position: relative; overflow: hidden; border-radius: 0.75rem; touch-action: pan-y; }
        .carrossel-track { display: flex; transition: transform .3s ease; will-change: transform; }
        .carrossel-track.dragging { transition: none; }
        .carrossel-track img { width: 100%; flex: 0 0 100%; height: 14rem; object-fit: cover; user-select: none; -webkit-user-drag: none; pointer-events: none; }
        .dots { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; justify-content: center; gap: 6px; }
        .dot { width: 6px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.4); transition: all .2s ease; }
        .dot.active { background: #fff; width: 16px; }
        .carrossel-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; width: 28px; height: 28px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 13px; opacity: 0; transition: opacity .2s ease; }
        .carrossel-wrap:hover .carrossel-arrow { opacity: 1; }

        .empty-state { animation: fadeIn .3s ease; }

        input[type="text"]:focus, input[type="search"]:focus { outline: none; box-shadow: 0 0 0 2px var(--accent); }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Elementos gráficos de fundo (tema impressão 3D) -->
    <div id="bg-elementos" aria-hidden="true">

        <!-- Cubo wireframe (canto superior esquerdo) -->
        <svg class="flutua-lenta" style="top:6%; left:-3%;" width="180" height="180" viewBox="0 0 180 180" fill="none">
            <g class="bg-icon-branco" stroke-width="1.4">
                <path d="M40 60 L100 30 L160 60 L100 90 Z"/>
                <path d="M40 60 L40 130 L100 160 L100 90"/>
                <path d="M160 60 L160 130 L100 160"/>
                <path d="M40 60 L100 90 M160 60 L100 90"/>
            </g>
        </svg>

        <!-- Engrenagem (canto inferior direito) -->
        <svg class="flutua-lenta-2" style="bottom:4%; right:-4%;" width="220" height="220" viewBox="0 0 220 220" fill="none">
            <g class="bg-icon-laranja" stroke-width="1.4">
                <circle cx="110" cy="110" r="46"/>
                <circle cx="110" cy="110" r="18"/>
                <path d="M110 44 L110 64 M110 156 L110 176 M44 110 L64 110 M156 110 L176 110
                         M65 65 L79 79 M141 141 L155 155 M155 65 L141 79 M79 141 L65 155"/>
            </g>
        </svg>

        <!-- Camadas de impressão FDM (meio direito) -->
        <svg class="flutua-lenta" style="top:38%; right:4%;" width="150" height="120" viewBox="0 0 150 120" fill="none">
            <g class="bg-icon-branco" stroke-width="1.3">
                <path d="M10 20 Q40 10 75 20 T140 20"/>
                <path d="M10 45 Q40 35 75 45 T140 45"/>
                <path d="M10 70 Q40 60 75 70 T140 70"/>
                <path d="M10 95 Q40 85 75 95 T140 95"/>
            </g>
        </svg>

        <!-- Bico extrusor (esquerda, meio-baixo) -->
        <svg class="flutua-lenta-2" style="bottom:12%; left:6%;" width="130" height="150" viewBox="0 0 130 150" fill="none">
            <g class="bg-icon-laranja" stroke-width="1.4">
                <path d="M35 20 H95 L80 70 H50 Z"/>
                <path d="M65 70 L65 100"/>
                <circle cx="65" cy="112" r="10"/>
                <path d="M35 20 H95" />
            </g>
        </svg>

        <!-- Cubo pequeno (topo direito) -->
        <svg class="flutua-lenta" style="top:8%; right:16%;" width="90" height="90" viewBox="0 0 90 90" fill="none">
            <g class="bg-icon-branco" stroke-width="1.2" opacity="0.8">
                <path d="M20 30 L45 18 L70 30 L45 42 Z"/>
                <path d="M20 30 L20 60 L45 72 L45 42"/>
                <path d="M70 30 L70 60 L45 72"/>
            </g>
        </svg>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-[#121212] p-8 rounded-2xl max-w-lg w-full border border-white/10 modal-scroll text-sm"></div>
    </div>

    <div id="view-catalogo" class="view active max-w-2xl mx-auto">
        <header class="text-center mb-10">
            <img src="ln.png" alt="Logo" class="mx-auto h-24 mb-4 drop-shadow-md">
            <div class="h-px bg-gradient-to-r from-transparent via-white/20 to-transparent w-full"></div>
        </header>
        <nav class="flex justify-between items-center mb-6">
            <h1 class="font-bold tracking-widest text-lg text-white display">CATÁLOGO</h1>
            <button onclick="mudarVista('view-carrinho')" class="bg-white text-black px-6 py-2 font-bold rounded-full text-xs hover:bg-gray-200 transition">CARRINHO (<span id="count">0</span>)</button>
        </nav>

        <div class="relative mb-4">
            <input type="search" id="pesquisa" placeholder="Pesquisar produto..." oninput="renderizarGrid()"
                class="w-full bg-[#111111] border border-white/10 rounded-xl py-3 pl-4 pr-10 text-sm text-white placeholder:text-gray-500">
            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm">⌕</span>
        </div>

        <div id="categorias" class="flex gap-2 overflow-x-auto pb-4 mb-4 -mx-1 px-1"></div>

        <div id="grid-produtos" class="flex flex-col gap-4"></div>
    </div>

    <div id="view-carrinho" class="view max-w-2xl mx-auto">
        <button onclick="mudarVista('view-catalogo')" class="text-gray-400 mb-6 font-bold hover:text-white transition">← VOLTAR À LOJA</button>
        <div class="p-8 bg-[#121212] rounded-2xl border border-white/10">
            <h2 class="text-2xl font-bold mb-6 text-white display">O TEU PEDIDO</h2>
            <div id="lista-carrinho" class="space-y-4 mb-6"></div>
            <div class="border-t border-white/10 pt-4 font-bold text-xl mb-6 text-orange-500">TOTAL: <span id="total-final">0,00€</span></div>
            <input type="text" id="nomeCliente" placeholder="Teu Nome" class="w-full p-4 bg-[#0a0a0a] border border-white/10 rounded-xl mb-4 text-white">
            <button onclick="finalizarPedido()" class="w-full bg-white text-black py-4 font-bold rounded-xl hover:bg-gray-200 transition">ENVIAR VIA WHATSAPP</button>
        </div>
    </div>

    <script>
        const produtos = [
            { id: 1, nome: "Secador de Capacetes #CSC", preco: 95, categoria: "Auto & SimRacing", pasta: "Secador de Capacetes CSC", fotos: ["ssc1.png","ssc2.png","ssc3.png","ssc4.png"], personalizacao: [ {label:"Cor dos pés", placeholder:"ex: preto"}, {label:"Cor da base", placeholder:"ex: preto"}, {label:"Personalização (nome e/ou número)", placeholder:"ex: João, nº 7"} ], desc: "Secador de capacetes e luvas composto por 3 ventoinhas (uma de 120mm p/ capacete e duas de 60mm p/ luvas). Inclui botão de ligar/desligar e cabo de alimentação. Pode ser personalizada a cor do stand, número e nome. Tempo de entrega: 2 semanas." },
            { id: 15, nome: "Secador de Capacetes e Luvas", preco: 95, categoria: "Auto & SimRacing", pasta: "Secador de Capacete e Luvas", fotos: ["scl1.png","scl2.png","scl3.png","scl4.png","scl5.png","scl6.png"], personalizacao: [ {label:"Cor dos pés", placeholder:"ex: preto"}, {label:"Cor da base", placeholder:"ex: preto"}, {label:"Personalização (nome e/ou número)", placeholder:"ex: João, nº 7"} ], desc: "Secador de capacetes e luvas.<br><br>Composto com 3 ventoinhas, uma de 120mm para secar o capacete e duas de 60mm para secar as luvas.<br>Inclui também um botão para ligar e desligar as ventoinhas e o respetivo cabo de alimentação.<br><br>Pode ser escolhida a cor só stand (pés e base) e pode ser incluída uma personalização, por exemplo com número e nome.<br><br>Valor sem personalização: 85€<br>Valor com personalização: 95€<br><br>Tempo previsto desde a encomenda à entrega: duas semanas." },
            { id: 2, nome: "Indicador SimRacing (RPM/Bandeiras)", preco: 30, categoria: "Auto & SimRacing", pasta: "Indicador de mudança bandeiras rpm Simracig", fotos: ["sim1.png","sim2.png","sim3.png","sim4.png"], personalizacao: [], desc: "Indicador de mudança, bandeiras e rotação (RPM).<br><br><strong>Compatibilidade:</strong> Assetto Corsa e Competizione, iRacing, rFactor 2, Project CARS 1 e 2, Automobilista 1 e 2, F1 Series (2020-24), Dirt Rally 1 e 2.0, Euro Truck/American Truck Sim, RaceRoom, BeamNG.drive, Forza Horizon 4 e 5, Gran Turismo 7, Live for Speed, WRC, KartKraft.<br><br><strong>Detalhes:</strong> Ligação Micro USB. Cores dos LEDs totalmente personalizáveis." },
            { id: 3, nome: "Bola de Natal - Cão", preco: 2.5, categoria: "Natal", pasta: "Bola de Natal - Cão", fotos: ["au.png","auau.png"], personalizacao: [ {label:"Nome", placeholder:"ex: Rex"}, {label:"Cor do topo e base", tipo:"select", opcoes:["Dourado","Cinzento","Vermelho"]}, {label:"Cor da fita", placeholder:"ex: vermelha"} ], desc: "Bola de natal em forma de patinha. Disponível versão com asinhas para homenagem. Personalizada com nome. Diâmetro: 8cm. Escolha a cor da fita." },
            { id: 4, nome: "Bola de Natal - Gato", preco: 2.5, categoria: "Natal", pasta: "Bola de Natal - Gato", fotos: ["miau.png"], personalizacao: [ {label:"Nome", placeholder:"ex: Mimi"}, {label:"Cor do topo e base", tipo:"select", opcoes:["Dourado","Cinzento","Vermelho"]}, {label:"Cor da fita", placeholder:"ex: vermelha"} ], desc: "Bola de natal em forma de cabeça de gatinho. Disponível com asinhas. Personalizada com nome. Diâmetro: 8cm. Escolha a cor da fita." },
            { id: 5, nome: "Bola de Natal - Melhor Auxiliar", preco: 2.5, categoria: "Natal", pasta: "Bola de Natal - Melhor Auxiliar", fotos: ["aux1.png","aux2.png"], personalizacao: [ {label:"Nome", placeholder:"ex: Ana"}, {label:"Cor do topo e base", tipo:"select", opcoes:["Dourado","Cinzento","Vermelho"]}, {label:"Cor da fita", placeholder:"ex: dourada"} ], desc: "Bola de natal para mimar os auxiliares. Personalizada com nome. Diâmetro: 8cm. Escolha a cor da fita." },
            { id: 6, nome: "Bola de Natal - Professor(a)", preco: 2.5, categoria: "Natal", pasta: "Bola de Natal - Melhor Professor(a)", fotos: ["prof1.png","prof2.png"], personalizacao: [ {label:"Cor do topo e base", tipo:"select", opcoes:["Dourado","Cinzento","Vermelho"]}, {label:"Cor da fita", placeholder:"ex: verde"} ], desc: "Bola de natal para mimar os professores(as). Diâmetro: 8cm. Escolha a cor da fita." },
            { id: 7, nome: "Bola de Natal - Educador(a)", preco: 2.5, categoria: "Natal", pasta: "Bola de Natal - Melhor Educador(a)", fotos: ["educa1.png","educa2.png"], personalizacao: [ {label:"Cor do topo e base", tipo:"select", opcoes:["Dourado","Cinzento","Vermelho"]}, {label:"Cor da fita", placeholder:"ex: verde"} ], desc: "Bola de Natal para o mimar os(as) Educadores(as) ! 🤍Escolha também a cor da fita para melhor condizer com a sua árvore de natal!Diametro de 8cm." },
            { id: 8, nome: "Bola de Natal - Boas Festas", preco: 2.5, categoria: "Natal", pasta: "Bola Feliz Natal  Boas Festas", fotos: ["festa1.png","festa2.png"], personalizacao: [ {label:"Cor do topo e base", tipo:"select", opcoes:["Dourado","Cinzento","Vermelho"]}, {label:"Cor da fita", placeholder:"ex: vermelha"} ], desc: "Bola de Natal para quem não pode passar sem oferecer uma lembrança! 🤍Escolha também a cor da fita para melhor condizer com a sua árvore de natal!Diametro de 8cm." },
            { id: 16, nome: "Bola de Natal Personalizada", preco: 2.5, categoria: "Natal", pasta: "Bola de Natal Personalizada", fotos: ["personal.png"], personalizacao: [ {label:"Nome", placeholder:"ex: Solange"}, {label:"Cor do topo e base", tipo:"select", opcoes:["Dourado","Cinzento","Vermelho"]}, {label:"Cor da fita", placeholder:"ex: vermelha"} ], desc: "Bola de Natal personalizada.<br><br>Também disponível versão com asinhas para homenagear os entes queridos 🤍<br><br>Personalizada com um nome à escolha.<br>Escolha também a cor da fita para melhor condizer com a sua árvore de natal!<br><br>Diâmetro de 8cm." },
            { id: 9, nome: "Bola com Fotografia", preco: 10, categoria: "Natal", pasta: "Bola com Fotografia", fotos: ["ft1.png","ft2.png","ft3.png"], personalizacao: [ {label:"Detalhes da fotografia (envia a foto depois por WhatsApp)", placeholder:"ex: foto de família de Natal"} ], desc: "Bola personalizada com fotografia à sua escolha. Iluminada através das luzes da sua árvore de Natal." },
            { id: 10, nome: "Caixa de Memórias", preco: 35, categoria: "Decoração & Presentes", pasta: "Caixa de memórias", fotos: ["1.png","2.png"], personalizacao: [ {label:"Cor da armação", placeholder:"ex: natural"}, {label:"Detalhes das fotografias (até 3, envia depois por WhatsApp)", placeholder:"ex: fotos de família"} ], desc: "Caixa de memórias que leva até 3 fotografias. É possível escolher a cor da armação." },
            { id: 11, nome: "Nome Infinito", preco: 15, categoria: "Decoração & Presentes", pasta: "Nome infinito", fotos: ["nome_infinito.png"], personalizacao: [ {label:"Nome", placeholder:"ex: Marta & João"}, {label:"Cor", placeholder:"ex: dourado"} ], desc: "Peça decorativa personalizável com nomes. Várias cores disponíveis." },
            { id: 12, nome: "Base Monstera", preco: 10, categoria: "Decoração & Presentes", pasta: "Base coposvelas monsteras", fotos: ["base.png"], personalizacao: [ {label:"Cor", placeholder:"ex: verde"} ], desc: "Conjunto composto por 4 folhas de monstera com base. Dimensão folha: 8cm x 10cm x 0,4cm. Dimensão base: 8,5cm x 10,5cm x 2,2cm." },
            { id: 13, nome: "Vaso Caveira", preco: 12, categoria: "Decoração & Presentes", pasta: "Caveiras vaso", fotos: ["cav1.png","cav2.png"], personalizacao: [ {label:"Cor", placeholder:"ex: preto"} ], desc: "Vaso decorativo para plantas ou para guardar chaves. Disponível em várias cores." },
            { id: 14, nome: "Luminária NameLed", preco: 30, categoria: "Decoração & Presentes", pasta: "NameLed", fotos: ["nl1.png","nl2.png"], personalizacao: [ {label:"Nome", placeholder:"ex: Beatriz"}, {label:"Cor(es) LED", placeholder:"ex: azul e branco"} ], desc: "Luminária personalizada com iluminação LED controlável com comando remoto. Permite até quatro cores diferentes. Dimensão máxima: 25cm x 25cm." }
        ];

        function caminhoFoto(produto, nomeFicheiro) {
            if (!produto.pasta) return nomeFicheiro;
            return encodeURIComponent(produto.pasta) + '/' + encodeURIComponent(nomeFicheiro);
        }

        let carrinho = [];
        let categoriaAtiva = "Todos";

        function mudarVista(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function renderizarCategorias() {
            const categorias = ["Todos", ...new Set(produtos.map(p => p.categoria))];
            const cont = document.getElementById('categorias');
            cont.innerHTML = categorias.map(c => `
                <button onclick="filtrarCategoria('${c}')" class="chip ${c === categoriaAtiva ? 'active' : ''} shrink-0 text-xs font-bold px-4 py-2 rounded-full border border-white/10 bg-[#111111] text-gray-300">${c}</button>
            `).join('');
        }

        function filtrarCategoria(c) {
            categoriaAtiva = c;
            renderizarCategorias();
            renderizarGrid();
        }

        function renderizarGrid() {
            const termo = document.getElementById('pesquisa').value.trim().toLowerCase();
            const grid = document.getElementById('grid-produtos');

            const filtrados = produtos.filter(p => {
                const passaCategoria = categoriaAtiva === "Todos" || p.categoria === categoriaAtiva;
                const passaPesquisa = !termo || p.nome.toLowerCase().includes(termo) || p.desc.toLowerCase().includes(termo);
                return passaCategoria && passaPesquisa;
            });

            if (filtrados.length === 0) {
                grid.innerHTML = `<div class="empty-state text-center text-gray-500 text-sm py-16">Nenhum produto encontrado.</div>`;
                return;
            }

            grid.innerHTML = filtrados.map(p => `
                <div class="card-produto flex items-center gap-4 bg-[#111111] p-4 rounded-xl border border-white/5 cursor-pointer" onclick="abrirDescricao(${p.id})">
                    <div class="w-16 h-16 rounded-lg overflow-hidden shrink-0">
                        <img src="${caminhoFoto(p, p.fotos[0])}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow min-w-0">
                        <h3 class="font-bold text-sm text-white truncate">${p.nome}</h3>
                        <p class="text-orange-500 font-bold text-xs">${p.preco.toFixed(2)}€</p>
                    </div>
                    <button onclick="event.stopPropagation(); abrirDescricao(${p.id})" class="shrink-0 text-[10px] bg-white/5 px-4 py-2 rounded-lg border border-white/10 hover:bg-white hover:text-black transition">DETALHES</button>
                </div>
            `).join('');
        }

        let carrosselState = { fotos: [], index: 0, startX: 0, deltaX: 0, dragging: false };
        let quantidadeAtual = 1;

        function mudarQuantidade(delta) {
            quantidadeAtual = Math.max(1, quantidadeAtual + delta);
            const el = document.getElementById('qtd-valor');
            if (el) el.innerText = quantidadeAtual;
        }

        function abrirDescricao(id) {
            const p = produtos.find(prod => prod.id === id);
            const modal = document.getElementById('modal');

            carrosselState = { fotos: p.fotos, index: 0, startX: 0, deltaX: 0, dragging: false };

            modal.classList.remove('hidden');
            document.getElementById('modal-content').innerHTML = `
                <div class="flex justify-end">
                    <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-white font-bold text-xl p-2">X</button>
                </div>

                <div class="carrossel-wrap mb-6" id="carrossel-wrap">
                    <div class="carrossel-track" id="carrossel-track">
                        ${p.fotos.map(f => `<img src="${caminhoFoto(p, f)}" draggable="false">`).join('')}
                    </div>
                    ${p.fotos.length > 1 ? `
                        <button onclick="mudarFotoModal(-1)" class="carrossel-arrow" style="left:8px;">❮</button>
                        <button onclick="mudarFotoModal(1)" class="carrossel-arrow" style="right:8px;">❯</button>
                        <div class="dots">${p.fotos.map((_, i) => `<span class="dot ${i === 0 ? 'active' : ''}"></span>`).join('')}</div>
                    ` : ''}
                </div>

                <h3 class="text-xl font-bold mb-2 text-white display">${p.nome}</h3>
                <p class="text-gray-400 text-sm mb-6 leading-relaxed">${p.desc}</p>

                <div class="flex items-center justify-between mb-4 bg-[#0a0a0a] rounded-xl p-3 border border-white/10">
                    <span class="text-sm font-bold text-gray-300">Quantidade</span>
                    <div class="flex items-center gap-4">
                        <button onclick="mudarQuantidade(-1)" class="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 text-white text-lg font-bold flex items-center justify-center transition">−</button>
                        <span id="qtd-valor" class="font-bold text-white w-6 text-center text-lg">1</span>
                        <button onclick="mudarQuantidade(1)" class="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 text-white text-lg font-bold flex items-center justify-center transition">+</button>
                    </div>
                </div>

                ${p.personalizacao && p.personalizacao.length ? `
                <div class="mb-4">
                    <p class="text-sm text-gray-400 mb-3">Preenche os detalhes da tua personalização:</p>
                    ${p.personalizacao.map(campo => campo.tipo === 'select' ? `
                        <label class="text-xs font-bold text-gray-400 mb-2 block">${campo.label}</label>
                        <select class="personaliza-input w-full bg-[#0a0a0a] border border-white/10 rounded-xl p-3 text-sm text-white mb-4" data-label="${campo.label}">
                            <option value="">Escolhe...</option>
                            ${campo.opcoes.map(op => `<option value="${op}">${op}</option>`).join('')}
                        </select>
                    ` : `
                        <label class="text-xs font-bold text-gray-400 mb-2 block">${campo.label}</label>
                        <input type="text" class="personaliza-input w-full bg-[#0a0a0a] border border-white/10 rounded-xl p-3 text-sm text-white placeholder:text-gray-600 mb-4" data-label="${campo.label}" placeholder="${campo.placeholder || ''}">
                    `).join('')}
                </div>
                ` : ''}

                <button onclick="adicionar(${p.id})" class="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-gray-200 transition">ADICIONAR AO CARRINHO</button>
            `;

            quantidadeAtual = 1;

            if (p.fotos.length > 1) ativarSwipe();
        }

        function atualizarCarrossel(comTransicao = true) {
            const track = document.getElementById('carrossel-track');
            if (!track) return;
            track.classList.toggle('dragging', !comTransicao);
            track.style.transform = `translateX(calc(${-carrosselState.index * 100}% + ${carrosselState.deltaX}px))`;
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === carrosselState.index));
        }

        function mudarFotoModal(direcao) {
            const total = carrosselState.fotos.length;
            carrosselState.index = (carrosselState.index + direcao + total) % total;
            carrosselState.deltaX = 0;
            atualizarCarrossel();
        }

        function ativarSwipe() {
            const wrap = document.getElementById('carrossel-wrap');
            const track = document.getElementById('carrossel-track');
            if (!wrap || !track) return;

            const onStart = (x) => { carrosselState.dragging = true; carrosselState.startX = x; carrosselState.deltaX = 0; };
            const onMove = (x) => {
                if (!carrosselState.dragging) return;
                carrosselState.deltaX = x - carrosselState.startX;
                atualizarCarrossel(false);
            };
            const onEnd = () => {
                if (!carrosselState.dragging) return;
                carrosselState.dragging = false;
                const limiar = wrap.clientWidth * 0.18;
                if (carrosselState.deltaX < -limiar) mudarFotoModal(1);
                else if (carrosselState.deltaX > limiar) mudarFotoModal(-1);
                else { carrosselState.deltaX = 0; atualizarCarrossel(); }
            };

            wrap.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
            wrap.addEventListener('touchmove', e => onMove(e.touches[0].clientX), { passive: true });
            wrap.addEventListener('touchend', onEnd);

            wrap.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX); });
            window.addEventListener('mousemove', e => onMove(e.clientX));
            window.addEventListener('mouseup', onEnd);
        }

        function adicionar(id) {
            const prod = produtos.find(p => p.id === id);
            const inputs = document.querySelectorAll('#modal-content .personaliza-input');

            const partes = [];
            let algumPreenchido = false;
            inputs.forEach(inp => {
                const val = inp.value.trim();
                inp.classList.remove('border-orange-500');
                if (val) { algumPreenchido = true; partes.push(`${inp.dataset.label}: ${val}`); }
            });

            if (inputs.length > 0 && !algumPreenchido) {
                inputs.forEach(inp => inp.classList.add('border-orange-500'));
                return;
            }

            const obs = partes.join(' | ');

            carrinho.push({ ...prod, obs, qtd: quantidadeAtual });
            document.getElementById('count').innerText = carrinho.reduce((soma, i) => soma + i.qtd, 0);
            atualizarCarrinho();
            document.getElementById('modal').classList.add('hidden');
        }

        function atualizarCarrinho() {
            let total = carrinho.reduce((sum, i) => sum + i.preco * i.qtd, 0);
            document.getElementById('total-final').innerText = total.toFixed(2) + "€";
            document.getElementById('lista-carrinho').innerHTML = carrinho.map((i, index) => `
                <div class="flex justify-between items-center text-sm border-b border-white/5 pb-3">
                    <div><p class="font-bold text-white">${i.nome} <span class="text-gray-400 font-normal">x${i.qtd}</span></p>${i.obs ? `<p class="text-orange-500">${i.obs}</p>` : ''}</div>
                    <div class="text-right font-bold">${(i.preco * i.qtd).toFixed(2)}€ <button onclick="carrinho.splice(${index},1); atualizarCarrinho(); document.getElementById('count').innerText = carrinho.reduce((s,x)=>s+x.qtd,0);" class="text-gray-600 ml-3">X</button></div>
                </div>
            `).join('');
        }

        function finalizarPedido() {
            const n = document.getElementById('nomeCliente').value;
            if(!n) { alert("Nome obrigatório!"); return; }
            let msg = `Olá! Encomenda de ${n}:%0A`;
            carrinho.forEach(i => msg += `- ${i.nome} x${i.qtd}${i.obs ? ` (${i.obs})` : ''} - ${(i.preco * i.qtd).toFixed(2)}€%0A`);
            msg += `%0ATOTAL: ${document.getElementById('total-final').innerText}`;

            const numero = "351215959525";
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isMobile) {
                // Tenta abrir a app diretamente via esquema whatsapp://
                const appUrl = `whatsapp://send?phone=${numero}&text=${msg}`;
                const webUrl = `https://wa.me/${numero}?text=${msg}`;
                window.location.href = appUrl;
                // Se a app não abrir em 1.5s (a página continua em foco), usa a versão web como fallback
                setTimeout(() => {
                    if (document.hasFocus()) {
                        window.location.href = webUrl;
                    }
                }, 1500);
            } else {
                window.open(`https://web.whatsapp.com/send?phone=${numero}&text=${msg}`, '_blank');
            }
        }

        renderizarCategorias();
        renderizarGrid();
    </script>
</body>
</html>
